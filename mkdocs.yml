site_name: Brady's Vocabulary Notebook
site_description: Personal vocabulary learning notebook for English, French, and Mandarin
docs_dir: vocabulary
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition

nav:
  - Home: index.md
  - English:
    - Adjectives: english/adjectives.md
    - Adverbs: english/adverbs.md
    - Nouns: english/nouns.md
    - Verbs: english/verbs.md
    - Phrases & Idioms: english/phrases.md
  - French:
    - Adjectives: french/adjectives.md
    - Adverbs: french/adverbs.md
    - Nouns: french/nouns.md
    - Verbs: french/verbs.md
    - Phrases: french/phrases.md
  - Mandarin:
    - Expressions (表达): mandarin/expressions.md
    - Idioms (成语): mandarin/chengyu.md
